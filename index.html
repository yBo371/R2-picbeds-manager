<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R2 图片管理器</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">R2</span>
          <div>
            <h1>R2 图片管理器</h1>
            <p>轻量浏览、预览、下载和管理 PicGo 上传的图片</p>
          </div>
        </div>
        <button id="refreshButton" class="icon-button" type="button" title="刷新列表" aria-label="刷新列表">↻</button>
      </header>

      <main>
        <section class="stats" aria-label="当前列表统计">
          <div class="stat">
            <span>已加载</span>
            <strong id="itemCount">0</strong>
          </div>
          <div class="stat">
            <span>总大小</span>
            <strong id="totalSize">0 B</strong>
          </div>
          <div class="stat stat-wide">
            <span>当前位置</span>
            <strong id="prefixBadge">根目录</strong>
          </div>
        </section>

        <section class="toolbar" aria-label="筛选工具">
          <div class="path-row">
            <div class="current-path">
              <span>当前路径</span>
              <strong id="currentPath">根目录</strong>
            </div>
            <div class="path-actions">
              <button id="rootButton" class="secondary-button" type="button">根目录</button>
              <button id="parentButton" class="secondary-button" type="button">返回上一级</button>
            </div>
          </div>

          <div class="directory-row">
            <span>子目录</span>
            <div id="prefixList" class="prefix-list" aria-label="子目录列表"></div>
          </div>

          <div class="filter-row">
            <label class="field grow">
              <span>搜索已加载文件</span>
              <input id="searchInput" type="search" placeholder="输入文件名" autocomplete="off" />
            </label>
            <label class="field">
              <span>排序</span>
              <select id="sortSelect">
                <option value="uploaded:desc">创建时间：从近到远</option>
                <option value="uploaded:asc">创建时间：从远到近</option>
                <option value="size:desc">文件大小：从大到小</option>
                <option value="size:asc">文件大小：从小到大</option>
                <option value="name:asc">文件名：A-Z</option>
                <option value="name:desc">文件名：Z-A</option>
                <option value="contentType:asc">文件类型：A-Z</option>
              </select>
            </label>
          </div>
        </section>

        <div id="notice" class="notice" role="status" aria-live="polite" hidden></div>
        <div id="grid" class="image-grid" aria-live="polite"></div>

        <div class="load-more-wrap">
          <button id="loadMoreButton" class="primary-button" type="button" hidden>加载更多</button>
        </div>
      </main>

      <dialog id="previewDialog" class="preview-dialog">
        <div class="preview-header">
          <strong id="previewTitle"></strong>
          <button id="closePreviewButton" class="icon-button" type="button" title="关闭预览" aria-label="关闭预览">
            ×
          </button>
        </div>
        <img id="previewImage" alt="" />
      </dialog>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
