<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R2 图片管理器</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">R2</span>
          <div>
            <h1>R2 图片管理器</h1>
            <p>轻量浏览、预览、下载和管理 PicGo 上传的图片</p>
          </div>
        </div>
        <div class="topbar-actions">
          <button id="allFilesButton" class="icon-button" type="button" title="全部文件" aria-label="全部文件">▦</button>
          <button id="refreshButton" class="icon-button" type="button" title="刷新列表" aria-label="刷新列表">↻</button>
        </div>
      </header>

      <main>
        <section class="stats" aria-label="当前列表统计">
          <div class="stat">
            <span>已加载</span>
            <strong id="itemCount">0</strong>
          </div>
          <div class="stat">
            <span>总大小</span>
            <strong id="totalSize">0 B</strong>
          </div>
          <div class="stat stat-wide">
            <span>当前位置</span>
            <strong id="prefixBadge">根目录</strong>
          </div>
        </section>

        <section class="toolbar" aria-label="筛选工具">
          <div class="filter-row">
            <div class="nav-controls" aria-label="目录导航">
              <button id="rootButton" class="icon-button" type="button" title="根目录" aria-label="根目录">⌂</button>
              <button id="backButton" class="icon-button" type="button" title="后退" aria-label="后退">←</button>
              <button id="forwardButton" class="icon-button" type="button" title="前进" aria-label="前进">→</button>
            </div>
            <label class="field grow">
              <span>搜索已加载文件</span>
              <input id="searchInput" type="search" placeholder="输入文件名" autocomplete="off" />
            </label>
            <label class="field">
              <span>排序字段</span>
              <select id="sortBySelect">
                <option value="name">名称</option>
                <option value="size">文件大小</option>
                <option value="uploaded" selected>创建时间</option>
              </select>
            </label>
            <label class="field">
              <span>排序方式</span>
              <select id="sortOrderSelect">
                <option value="asc">递增</option>
                <option value="desc" selected>递减</option>
              </select>
            </label>
          </div>
        </section>

        <div id="notice" class="notice" role="status" aria-live="polite" hidden></div>
        <div id="grid" class="image-grid" aria-live="polite"></div>

        <div class="load-more-wrap">
          <button id="loadMoreButton" class="primary-button" type="button" hidden>加载更多</button>
        </div>
      </main>

      <dialog id="previewDialog" class="preview-dialog">
        <div class="preview-header">
          <strong id="previewTitle"></strong>
          <button id="closePreviewButton" class="icon-button" type="button" title="关闭预览" aria-label="关闭预览">
            ×
          </button>
        </div>
        <img id="previewImage" alt="" />
      </dialog>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
